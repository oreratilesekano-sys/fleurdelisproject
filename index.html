<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Omontle, I'm Sorry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Prevents accidental text selection */
        }

        body {
            background: linear-gradient(145deg, #ffe4ec 0%, #ffc0d0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 245, 250, 0.92);
            border-radius: 48px;
            box-shadow: 0 25px 50px rgba(255, 105, 180, 0.25);
            padding: 30px 25px 45px;
            text-align: center;
            backdrop-filter: blur(2px);
            border: 2px solid #ffb7c5;
        }

        h1 {
            font-size: 2rem;
            color: #b13e5c;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        .instruction {
            font-size: 1rem;
            background: #ffeef4;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            color: #c94f6f;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .game-area {
            position: relative;
            min-height: 450px;
            background: #fff0f5;
            border-radius: 40px;
            margin: 20px 0;
            box-shadow: inset 0 0 0 2px #ffc0d0, 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .clickable-item {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            z-index: 20;
        }
        .clickable-item:active {
            transform: scale(0.85);
        }

        .dog-icon, .lily-icon {
            font-size: 44px;
        }

        .counter {
            background: #ffd0dd;
            padding: 10px 20px;
            border-radius: 60px;
            display: inline-flex;
            gap: 15px;
            margin: 15px auto;
            font-weight: bold;
            color: #a13554;
        }

        .counter span {
            font-size: 1.6rem;
            background: white;
            padding: 4px 16px;
            border-radius: 50px;
            margin-left: 8px;
            color: #e85d8a;
        }

        .letter-section {
            margin-top: 30px;
            background: #fffafc;
            border-radius: 40px;
            padding: 25px;
            display: none;
            border: 2px solid #ffa5c0;
        }

        .music-player {
            background: #ffeef2;
            border-radius: 28px;
            padding: 12px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        iframe {
            border-radius: 20px;
            max-width: 100%;
        }

        .gif-box {
            margin: 20px 0;
        }
        .gif-box img {
            max-width: 100%;
            border-radius: 28px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            width: 100%;
        }

        .apology-text {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            border-radius: 28px;
            border: 2px solid #ffb7c5;
            background: #fffef7;
            font-family: inherit;
            margin: 15px 0;
            resize: vertical;
        }

        /* Read-only style - can't edit */
        .apology-text[readonly] {
            background: #fef7f9;
            cursor: default;
            color: #2c2c2c;
        }

        .final-btn {
            background: linear-gradient(95deg, #ff96b5, #ff6f91);
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            box-shadow: 0 4px 0 #9e3e5a;
        }
        .final-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .second-page {
            display: none;
            text-align: center;
        }

        .video-container {
            margin: 30px 0;
        }

        .video-container iframe {
            width: 100%;
            max-width: 400px;
            border-radius: 32px;
        }

        .message-final {
            font-size: 1.5rem;
            background: #ffd9e4;
            padding: 20px;
            border-radius: 50px;
            margin-top: 30px;
            color: #b13e5c;
            font-weight: 500;
        }

        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #e28aa8;
        }

        @media (max-width: 600px) {
            .game-area { min-height: 480px; }
            .dog-icon, .lily-icon { font-size: 40px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- GAME STAGE -->
    <div id="gameStage" class="game-container">
        <h1>Omontle, I'm Sorry</h1>
        <div class="instruction">find 7 hidden things</div>
        <div class="game-area" id="gameArea"></div>
        <div class="counter">
            found: <span id="collectedCount">0</span> / 7
        </div>
        <footer>click on each puppy and lily</footer>
    </div>

    <!-- LETTER STAGE (hidden initially) -->
    <div id="letterStage" class="game-container" style="display: none;">
        <h1>hear me out rq</h1>
        
        <!-- Music player - updated song -->
        <div class="music-player">
            <iframe style="border-radius:12px" 
                    src="https://open.spotify.com/embed/track/4skknrc3sJqaPTtUr2cwFq?utm_source=generator&theme=0" 
                    width="100%" height="80" frameBorder="0" 
                    allowfullscreen="" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-inline" 
                    loading="lazy">
            </iframe>
        </div>

        <!-- The Notebook GIF -->
        <div class="gif-box">
            <img src="https://media1.tenor.com/m/SUIofc38H9UAAAAC/big-house-the-notebook.gif" alt="The Notebook scene">
        </div>

        <!-- Apology message - READ ONLY (cannot edit) -->
        <textarea id="apologyMessage" class="apology-text" rows="6" readonly placeholder="Loading your message..."></textarea>
        
        <!-- Updated button text -->
        <button id="goToVideoBtn" class="final-btn">one last thing before you leave</button>
        <footer style="margin-top: 10px;"></footer>
    </div>

    <!-- VIDEO FINAL PAGE -->
    <div id="videoPage" class="game-container" style="display: none;">
        <h1>one last thing</h1>
        <div class="video-container">
            <!-- TikTok embed -->
            <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@zerovision_/video/7247583930382241070" data-video-id="7247583930382241070" style="max-width: 400px; min-width: 280px; margin:0 auto; border-radius: 28px;">
                <section>
                    <a target="_blank" href="https://www.tiktok.com/@zerovision_/video/7247583930382241070">@zerovision_</a>
                </section>
            </blockquote>
            <script async src="https://www.tiktok.com/embed.js"></script>
        </div>
        <!-- No emojis here as requested -->
        <div class="message-final">
            Text me, I miss you fr
        </div>
        <footer style="margin-top: 35px;"></footer>
    </div>
</div>

<script>
    // ---------- GAME LOGIC ----------
    const gameArea = document.getElementById('gameArea');
    const collectedSpan = document.getElementById('collectedCount');
    let collected = 0;
    let itemsList = [];
    const TOTAL_ITEMS = 7;

    // Cute icons: puppies and lilies only
    const icons = ['🐶', '🐕', '🐩', '🐕‍🦺', '🌷', '🌸', '🌺', '🌼'];

    function getRandomPosition(areaWidth, areaHeight, elementSize = 50) {
        const safeWidth = Math.max(100, areaWidth - elementSize - 30);
        const safeHeight = Math.max(100, areaHeight - elementSize - 30);
        const x = 15 + Math.random() * safeWidth;
        const y = 15 + Math.random() * safeHeight;
        return { x, y };
    }

    function createAndAddItem() {
        const areaRect = gameArea.getBoundingClientRect();
        let width = areaRect.width || 600;
        let height = areaRect.height || 450;
        
        const randomIcon = icons[Math.floor(Math.random() * icons.length)];
        const isDog = ['🐶', '🐕', '🐩', '🐕‍🦺'].includes(randomIcon);
        
        const div = document.createElement('div');
        div.className = 'clickable-item';
        div.innerHTML = `<span class="${isDog ? 'dog-icon' : 'lily-icon'}">${randomIcon}</span>`;
        div.style.position = 'absolute';
        
        const { x, y } = getRandomPosition(width, height, 50);
        div.style.left = `${x}px`;
        div.style.top = `${y}px`;
        div.style.cursor = 'pointer';
        
        div.addEventListener('click', (e) => {
            e.stopPropagation();
            if (div.parentNode) {
                div.remove();
                collected++;
                collectedSpan.innerText = collected;
                
                if (collected === TOTAL_ITEMS) {
                    completeGame();
                }
            }
        });
        
        gameArea.appendChild(div);
        return div;
    }

    function spawnAllItems() {
        // Clear existing
        const existing = document.querySelectorAll('.clickable-item');
        existing.forEach(el => el.remove());
        collected = 0;
        collectedSpan.innerText = "0";
        
        // Create all 7 items IMMEDIATELY
        for (let i = 0; i < TOTAL_ITEMS; i++) {
            createAndAddItem();
        }
    }

    function repositionItems() {
        const allItems = document.querySelectorAll('.clickable-item');
        const areaRect = gameArea.getBoundingClientRect();
        if (areaRect.width === 0) return;
        
        allItems.forEach(item => {
            const maxX = areaRect.width - 70;
            const maxY = areaRect.height - 70;
            const newX = 10 + Math.random() * Math.max(10, maxX);
            const newY = 10 + Math.random() * Math.max(10, maxY);
            item.style.left = `${newX}px`;
            item.style.top = `${newY}px`;
        });
    }

    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            repositionItems();
        }, 150);
    });

    function completeGame() {
        const gameContainer = document.getElementById('gameStage');
        const letterContainer = document.getElementById('letterStage');
        
        gameContainer.style.transition = "opacity 0.4s";
        gameContainer.style.opacity = "0";
        
        setTimeout(() => {
            gameContainer.style.display = "none";
            letterContainer.style.display = "block";
            letterContainer.style.opacity = "0";
            letterContainer.style.transition = "opacity 0.5s";
            setTimeout(() => { 
                letterContainer.style.opacity = "1"; 
            }, 30);
        }, 300);
    }

    // Set the apology message (you will edit this line with your actual letter)
    // This is where YOU paste your real message - it will be read-only for her
    window.addEventListener('load', () => {
        // IMPORTANT: Replace the text below with your actual apology letter
        const yourMessage = `Omontle,
        
I've spent a lot of time thinking about everything. Not just what happened, but who I was when it happened. I was distant when you needed presence. I disappeared when you deserved consistency. I don't have an excuse for that.

I'm not asking for anything. I just needed you to know that I finally understand the weight of how I made you feel. And I'm sorry. Truly.

I've been working on myself. Not for this moment, but because I never want to be that person again.

Take your time. No pressure. I just wanted you to know you still cross my mind every single day.`;
        
        const textarea = document.getElementById('apologyMessage');
        if (textarea) {
            textarea.value = yourMessage;
            textarea.setAttribute('readonly', 'readonly');
        }
    });

    // Video page navigation
    document.getElementById('goToVideoBtn')?.addEventListener('click', () => {
        const letterContainer = document.getElementById('letterStage');
        const videoContainer = document.getElementById('videoPage');
        letterContainer.style.display = "none";
        videoContainer.style.display = "block";
        
        // Refresh TikTok embed if needed
        const script = document.createElement('script');
        script.src = "https://www.tiktok.com/embed.js";
        document.body.appendChild(script);
    });

    // Initialize game immediately when page loads
    window.addEventListener('load', () => {
        // Small delay to ensure DOM is fully painted, then spawn items instantly
        setTimeout(() => {
            spawnAllItems();
        }, 50);
        
        // Also reposition on orientation change
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                repositionItems();
            }, 100);
        });
    });

    // Observe game area size changes
    const resizeObserver = new ResizeObserver(() => {
        repositionItems();
    });
    if(gameArea) resizeObserver.observe(gameArea);
</script>
</body>
</html>
