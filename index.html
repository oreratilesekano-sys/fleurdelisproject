<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>For You 💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Prevents accidental text selection while clicking game items */
        }

        body {
            background: linear-gradient(145deg, #ffe4ec 0%, #ffc0d0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 20px;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><polygon points="2,2 22,13 12,16 2,25" fill="%23ff69b4" stroke="white" stroke-width="1.5"/></svg>') 4 2, auto;
        }

        /* Main container */
        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 245, 250, 0.9);
            border-radius: 60px 60px 80px 80px;
            box-shadow: 0 25px 50px rgba(255, 105, 180, 0.3);
            padding: 30px 25px 45px;
            text-align: center;
            backdrop-filter: blur(2px);
            transition: all 0.3s ease;
            border: 2px solid #ffb7c5;
        }

        h1 {
            font-size: 2rem;
            color: #b13e5c;
            text-shadow: 2px 2px 0 #ffd9e4;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .instruction {
            font-size: 1.2rem;
            background: #ffeef4;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            color: #c94f6f;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* The game area where items will float */
        .game-area {
            position: relative;
            min-height: 400px;
            background: #fff0f5;
            border-radius: 48px;
            margin: 20px 0;
            box-shadow: inset 0 0 0 2px #ffc0d0, 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* Hidden game items */
        .clickable-item {
            position: absolute;
            cursor: pointer;
            transition: transform 0.15s ease;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            z-index: 20;
        }
        .clickable-item:active {
            transform: scale(0.85);
        }

        /* Dog & lily emoji / icons (cute and universal) */
        .dog-icon {
            font-size: 44px;
        }
        .lily-icon {
            font-size: 48px;
        }

        /* progress counter */
        .counter {
            background: #ffd0dd;
            padding: 12px;
            border-radius: 60px;
            display: inline-flex;
            gap: 20px;
            margin: 20px auto;
            font-weight: bold;
            color: #a13554;
        }

        .counter span {
            font-size: 1.8rem;
            background: white;
            padding: 5px 18px;
            border-radius: 50px;
            margin-left: 8px;
            color: #e85d8a;
        }

        /* hidden letter section */
        .letter-section {
            margin-top: 30px;
            background: #fffafc;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: none;
            border: 2px solid #ffa5c0;
            transition: 0.5s;
        }

        .music-player {
            background: #ffeef2;
            border-radius: 32px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        iframe {
            border-radius: 20px;
            max-width: 100%;
        }

        .gif-box {
            margin: 20px 0;
        }
        .gif-box img {
            max-width: 100%;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%;
        }

        .apology-text {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            border-radius: 28px;
            border: 2px solid #ffb7c5;
            background: white;
            font-family: inherit;
            margin: 15px 0;
            resize: vertical;
        }

        .final-btn {
            background: linear-gradient(95deg, #ff96b5, #ff6f91);
            border: none;
            padding: 16px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            box-shadow: 0 5px 0 #9e3e5a;
        }
        .final-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .second-page {
            display: none;
            text-align: center;
        }

        .video-container {
            margin: 30px 0;
        }

        .video-container video, .video-container iframe {
            width: 100%;
            max-width: 400px;
            border-radius: 40px;
        }

        .message-final {
            font-size: 1.8rem;
            background: #ffd9e4;
            padding: 20px;
            border-radius: 50px;
            margin-top: 30px;
            color: #b13e5c;
        }

        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #e28aa8;
        }

        @media (max-width: 600px) {
            .game-area { min-height: 480px; }
            .dog-icon, .lily-icon { font-size: 38px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- GAME STAGE -->
    <div id="gameStage" class="game-container">
        <h1>💗 for you, softly 💗</h1>
        <div class="instruction">🐾 find 7 tiny puppies & lilies 🐾</div>
        <div class="game-area" id="gameArea"></div>
        <div class="counter">
            🧸 collected: <span id="collectedCount">0</span> / 7
        </div>
        <footer>click on every little friend + flower 🌸🐶</footer>
    </div>

    <!-- LETTER STAGE (hidden initially) -->
    <div id="letterStage" class="game-container" style="display: none;">
        <h1>🌸 a page for you 🌸</h1>
        
        <!-- Music player (Spotify embed - Jungle by Drake) -->
        <div class="music-player">
            <iframe style="border-radius:12px" 
                    src="https://open.spotify.com/embed/track/1Fp9UZxP7N2RuopLpP8KpA?utm_source=generator&theme=0" 
                    width="100%" height="80" frameBorder="0" 
                    allowfullscreen="" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-inline" 
                    loading="lazy">
            </iframe>
        </div>

        <!-- The Notebook GIF -->
        <div class="gif-box">
            <img src="https://media1.tenor.com/m/SUIofc38H9UAAAAC/big-house-the-notebook.gif" alt="The Notebook scene">
        </div>

        <!-- Apology message box (she can write/read) but you will fill in your final letter -->
        <textarea id="apologyMessage" class="apology-text" rows="6" placeholder="Your message will appear here... (leave blank, i'll fill this with my words)"></textarea>
        
        <!-- Final button to go to video page -->
        <button id="goToVideoBtn" class="final-btn">📼 open my heart &rarr;</button>
        <footer>click when you're ready</footer>
    </div>

    <!-- VIDEO FINAL PAGE -->
    <div id="videoPage" class="game-container" style="display: none;">
        <h1>💌 one last thing 💌</h1>
        <div class="video-container">
            <!-- TikTok embed (using TikTok's official embed) -->
            <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@zerovision_/video/7247583930382241070" data-video-id="7247583930382241070" style="max-width: 400px; min-width: 280px; margin:0 auto; border-radius: 28px;">
                <section>
                    <a target="_blank" href="https://www.tiktok.com/@zerovision_/video/7247583930382241070">@zerovision_</a>
                </section>
            </blockquote>
            <script async src="https://www.tiktok.com/embed.js"></script>
        </div>
        <div class="message-final">
            📱 Text me, i miss you fr 💖
        </div>
        <footer style="margin-top: 35px;">you'll always be worth the effort.</footer>
    </div>
</div>

<script>
    // ---------- GAME LOGIC ----------
    const gameArea = document.getElementById('gameArea');
    const collectedSpan = document.getElementById('collectedCount');
    let collected = 0;
    let items = []; // store created elements for potential cleanup (not necessary)
    const TOTAL_ITEMS = 7;

    // cute icons: mix of puppies and lilies
    const icons = [
        '🐶', '🐕', '🐕‍🦺', '🐩',  // dogs
        '🌸', '🌷', '🌺', '🌼', '⚜️'  // lilies / floral vibe
    ];
    
    // function to generate random positions within game area (avoid edges)
    function getRandomPosition(areaWidth, areaHeight, elementWidth = 50, elementHeight = 50) {
        const maxX = Math.max(100, areaWidth - elementWidth - 20);
        const maxY = Math.max(100, areaHeight - elementHeight - 20);
        const x = 20 + Math.random() * (maxX - 20);
        const y = 20 + Math.random() * (maxY - 20);
        return { x, y };
    }

    function createItem() {
        const areaRect = gameArea.getBoundingClientRect();
        // if area not visible yet (width 0), use fallback
        let width = areaRect.width;
        let height = areaRect.height;
        if (width === 0) {
            width = 600;
            height = 400;
        }
        
        const isDog = Math.random() > 0.5;
        let icon = isDog ? '🐶' : '🌷';
        // alternative to ensure puppy love: sometimes puppy or lily
        if (Math.random() > 0.6) icon = '🐕'; 
        if (Math.random() > 0.7) icon = '🌼';
        
        const div = document.createElement('div');
        div.className = 'clickable-item';
        // randomly choose dog or lily but keep the theme cute:
        const finalIcon = icons[Math.floor(Math.random() * icons.length)];
        div.innerHTML = `<span class="${finalIcon === '🐶' || finalIcon === '🐕' || finalIcon === '🐩' || finalIcon === '🐕‍🦺' ? 'dog-icon' : 'lily-icon'}">${finalIcon}</span>`;
        div.style.position = 'absolute';
        
        const { x, y } = getRandomPosition(width, height, 50, 50);
        div.style.left = `${x}px`;
        div.style.top = `${y}px`;
        div.style.cursor = 'pointer';
        
        div.addEventListener('click', (e) => {
            e.stopPropagation();
            if (div.parentNode) {
                div.remove();
                collected++;
                collectedSpan.innerText = collected;
                
                // play little subtle pop effect (optional)
                if (collected === TOTAL_ITEMS) {
                    // game complete -> reveal letter stage
                    completeGame();
                }
            }
        });
        
        gameArea.appendChild(div);
        return div;
    }

    function spawnItems() {
        // clear any existing items
        const existing = document.querySelectorAll('.clickable-item');
        existing.forEach(el => el.remove());
        collected = 0;
        collectedSpan.innerText = "0";
        for (let i = 0; i < TOTAL_ITEMS; i++) {
            createItem();
        }
    }
    
    // on window resize, reposition items (keep game fun)
    let resizeTimeout;
    function repositionItems() {
        const allItems = document.querySelectorAll('.clickable-item');
        const areaRect = gameArea.getBoundingClientRect();
        if (areaRect.width === 0) return;
        allItems.forEach(item => {
            const maxX = areaRect.width - 60;
            const maxY = areaRect.height - 60;
            const newX = 10 + Math.random() * (maxX - 10);
            const newY = 10 + Math.random() * (maxY - 10);
            item.style.left = `${newX}px`;
            item.style.top = `${newY}px`;
        });
    }
    
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            repositionItems();
        }, 200);
    });
    
    function completeGame() {
        // fade out game container, show letter container
        const gameContainer = document.getElementById('gameStage');
        const letterContainer = document.getElementById('letterStage');
        gameContainer.style.transition = "opacity 0.4s";
        gameContainer.style.opacity = "0";
        setTimeout(() => {
            gameContainer.style.display = "none";
            letterContainer.style.display = "block";
            letterContainer.style.opacity = "0";
            letterContainer.style.transition = "opacity 0.6s";
            setTimeout(() => { letterContainer.style.opacity = "1"; }, 30);
        }, 300);
        
        // pre-fill a note ? but leave blank for user to write
        const textarea = document.getElementById('apologyMessage');
        // you'll fill this manually later. Show placeholder but empty content
        textarea.value = "";   // blank as requested; you will write your message directly
        textarea.placeholder = "💌 Write your apology letter here, from the heart. ✨";
    }
    
    // navigate to video page
    document.getElementById('goToVideoBtn')?.addEventListener('click', () => {
        const letterContainer = document.getElementById('letterStage');
        const videoContainer = document.getElementById('videoPage');
        letterContainer.style.display = "none";
        videoContainer.style.display = "block";
        // ensure tiktok embed reloads if needed, but script already loaded
        // re-run if embed fails: just reloads or already shown.
        if (window.tiktokEmbedRefresh) window.tiktokEmbedRefresh();
        else {
            // simple retrigger
            const script = document.createElement('script');
            script.src = "https://www.tiktok.com/embed.js";
            document.body.appendChild(script);
        }
    });
    
    // initialize game once the DOM loads
    window.addEventListener('load', () => {
        // ensure game area has dimensions after layout
        setTimeout(() => {
            spawnItems();
        }, 100);
        
        // adjust items on orientation change
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                repositionItems();
            }, 200);
        });
    });
    
    // background subtle adjust on game area resize
    const resizeObserver = new ResizeObserver(() => {
        repositionItems();
    });
    if(gameArea) resizeObserver.observe(gameArea);
</script>
</body>
</html>
